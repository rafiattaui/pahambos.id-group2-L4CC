name: Todo CSBI Hub CI/CD

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo-list-nextjs:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/todo-list-nextjs:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_DOCS_ENABLED=${{ secrets.NEXT_PUBLIC_API_DOCS_ENABLED }}
            NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}

  deploy:
    needs: build
    runs-on: self-hosted
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env.production from GitHub Secrets
        # This file is only created on the runner machine during deploy.
        # Store FIREBASE_PRIVATE_KEY in GitHub Secrets with real newlines.
        run: |
          cat > .env.production <<EOF
          # Server Setup
          NODE_ENV=${{ secrets.NODE_ENV }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_DOCS_ENABLED=${{ secrets.NEXT_PUBLIC_API_DOCS_ENABLED }}

          # Prisma + Postgres config
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          # Better auth config
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}

          # CLOUDINARY CONFIG
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_API_KEY=${{ secrets.NEXT_PUBLIC_CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          EOF

      - name: Login to Docker Hub (pull)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/todo-list-nextjs:latest

      - name: Build DB migration image (local target)
        run: docker compose --profile migrate build --pull db-schema-sync

      - name: Run DB Migration
        run: docker compose --profile migrate run --rm db-schema-sync

      # Avoid `docker compose down` / `--remove-orphans` if other stacks share the same project name.
      # Runtime secrets match `.env.example` and are loaded from `.env.production` on this machine
      # (same directory as `docker-compose.yml`). Keep that file out of git.
      - name: Deploy Todo app only
        run: |
          docker compose pull app
          docker compose up -d --no-deps app

      - name: Remove temporary env file
        if: always()
        run: rm -f .env.production

      - name: Cleanup dangling images
        run: docker image prune -f