$kind: http-example
request:
  url: "{{baseUrl}}/api/quiz/ai"
  method: POST
  body:
    type: json
    content: "{\r

      \    \"title\": \"Multiplication Math Quiz\",\r

      \    \"description\": \"Simple Multiplication quiz ranging from single digit to three digit.\",\r

      \    \"numQuestions\": 4,\r

      \    \"difficulty\": 3\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    x-ratelimit-remaining: "99"
    vary: rsc, next-router-state-tree, next-router-prefetch, next-router-segment-prefetch
    content-type: text/plain;charset=UTF-8
    set-cookie: better-auth.session_; Path=/; Expires=Sun, 14 Jun 2026 08:12:47 GMT; Max-Age=300; HttpOnly; SameSite=lax
    date: Sun, 14 Jun 2026 08:07:47 GMT
    connection: keep-alive
    keep-alive: timeout=5
    transfer-encoding: chunked
  body:
    type: text
    content: '{"success":true,"data":[{"order":0,"question":"What is 7 × 6?","type":"SingleSelect","time":30,"answers":["42","36","48","54"],"correctAnswers":[0]},{"order":1,"question":"Select all the correct products of 12 × 5 and 13 × 5.","type":"MultiSelect","time":30,"answers":["60","65","55","70"],"correctAnswers":[1]},{"order":2,"question":"What is 14 × 9?","type":"SingleSelect","time":30,"answers":["126","112","140","144"],"correctAnswers":[0]},{"order":3,"question":"Select all correct results of 15×7 and 16×7.","type":"MultiSelect","time":30,"answers":["105","112","100","120"],"correctAnswers":[1]}]}'
order: 1000
