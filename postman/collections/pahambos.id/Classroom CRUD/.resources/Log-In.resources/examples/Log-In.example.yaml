$kind: http-example
request:
  url: localhost:3000/api/auth/sign-in/email
  method: POST
  headers:
    Content-Type: application/json
    User-Agent: insomnia/12.6.0
    Origin: http://localhost:3000
  body:
    type: json
    content: |-
      {
        "email": "test@gmail.com",
        "password": "12345678"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: x-ratelimit-remaining
      value: "98"
    - key: vary
      value: rsc, next-router-state-tree, next-router-prefetch, next-router-segment-prefetch
    - key: content-type
      value: application/json
    - key: set-cookie
      value: better-auth.session_token=Cgk38HrNWqx6SJkOqoYx0yBXDQjbopSw.gtGuOha%2FcO6tmOiuIkJjlWkIcCn2liQW88OGqkWyK90%3D; Max-Age=604800; Path=/; HttpOnly; SameSite=Lax
    - key: set-cookie
      value: better-auth.session_data=; Max-Age=0; Path=/; HttpOnly; SameSite=Lax
    - key: set-cookie
      value: better-auth.session_; Max-Age=300; Path=/; HttpOnly; SameSite=Lax
    - key: Date
      value: Mon, 08 Jun 2026 13:16:19 GMT
    - key: Connection
      value: keep-alive
    - key: Keep-Alive
      value: timeout=5
    - key: Transfer-Encoding
      value: chunked
  body:
    type: text
    content: |-
      {
          "redirect": false,
          "token": "Cgk38HrNWqx6SJkOqoYx0yBXDQjbopSw",
          "user": {
              "name": "atta",
              "email": "test@gmail.com",
              "emailVerified": false,
              "image": null,
              "createdAt": "2026-05-24T10:40:50.252Z",
              "updatedAt": "2026-05-24T10:40:50.252Z",
              "id": "f0ec9f5a-3d7b-4623-9249-1501261b47b8"
          }
      }
order: 1000
