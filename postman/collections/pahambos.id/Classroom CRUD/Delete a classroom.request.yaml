$kind: http-request
url: localhost:3000/api/class
method: DELETE
body:
  type: json
  content: "{\r

    \    \"classroomId\": \"{{classroomId}}\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status is 200\", () => {\r

      \    pm.response.to.have.status(200);\r

      })\r

      \r

      pm.test(\"Has a deleted field\", () => {\r

      \    pm.response.to.have.jsonBody('deleted');\r

      });"
    language: text/javascript
examples: ./.resources/Delete a classroom.resources/examples
order: 9000
