$kind: http-request
name: Delete classroom assignment
url: localhost:3000/api/class/assignment/{{assignmentId}}
method: DELETE
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Assignment removed\", () => {\r

      \    pm.expect(pm.response.json().message).to.eql(\"Quiz assignment removed from classroom successfully.\");\r

      })"
    language: text/javascript
order: 10000
