$kind: http-example
request:
  url: localhost:3000/api/quiz/
  method: POST
  body:
    type: formdata
    content:
      - type: text
        key: quiz.title
        value: General Knowledge Blitz
      - type: text
        key: quiz.description
        value: A quick test quiz with 2 questions.
      - type: text
        key: quiz.category
        value: General
      - type: text
        key: questions[0].order
        value: "0"
      - type: text
        key: questions[0].question
        value: What is the capital of France?
      - type: text
        key: questions[0].type
        value: MultiSelect
      - type: text
        key: questions[0].time
        value: "3"
      - type: text
        key: questions[0].answers[0]
        value: London
      - type: text
        key: questions[0].answers[1]
        value: Paris
      - type: text
        key: questions[0].answers[2]
        value: Berlin
      - type: text
        key: questions[0].correctAnswers[0]
        value: "1"
      - type: text
        key: questions[1].order
        value: "1"
      - type: text
        key: questions[1].question
        value: Which of these are prime numbers?
      - type: text
        key: questions[1].type
        value: MultiSelect
      - type: text
        key: questions[1].time
        value: Testing
      - type: text
        key: questions[1].answers[0]
        value: "4"
      - type: text
        key: questions[1].answers[1]
        value: "7"
      - type: text
        key: questions[1].answers[2]
        value: "9"
      - type: text
        key: questions[1].answers[3]
        value: "11"
      - type: text
        key: questions[1].correctAnswers[0]
        value: "1"
      - type: text
        key: questions[1].correctAnswers[1]
        value: "3"
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    x-ratelimit-remaining: "98"
    vary: rsc, next-router-state-tree, next-router-prefetch, next-router-segment-prefetch
    content-type: application/json
    date: Mon, 15 Jun 2026 17:17:17 GMT
    connection: keep-alive
    keep-alive: timeout=5
    transfer-encoding: chunked
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Validation failed",
        "details": {
          "formErrors": [],
          "fieldErrors": {
            "questions": [
              "Invalid input: expected number, received NaN"
            ]
          }
        }
      }
order: 2000
