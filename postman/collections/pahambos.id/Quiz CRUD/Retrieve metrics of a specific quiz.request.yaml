$kind: http-request
description: |-
  ## Retrieve Metrics of a Specific Quiz

  Retrieves performance metrics for a specific quiz identified by its unique ID. This endpoint returns statistical or analytical data associated with the given quiz's performance record.

  ---

  ### HTTP Method & URL

  ```
  GET localhost:3000/api/performance/:quizId
  ```

  ---

  ### Path Parameters

  | Parameter | Type   | Required | Description                                      | Example                                |
  |-----------|--------|----------|--------------------------------------------------|----------------------------------------|
  | `quizId`  | UUID   | Yes      | The unique identifier of the quiz to retrieve metrics for | `ae4d32bb-f39c-4d49-b73c-dff3a8e018de` |

  ---

  ### Successful Response

  **Status:** `200 OK`

  Returns a JSON object containing the performance metrics for the specified quiz. This may include data such as scores, completion rates, attempt counts, or other relevant analytics tied to the quiz.

  ---

  ### Error Response

  **Status:** `404 Not Found`

  Returned when no performance record is found for the provided quiz ID.

  ```json
  {
    "success": false,
    "error": "Performance not found"
  }
  ```
url: localhost:3000/api/performance/29955e49-b640-4117-8d0c-d1f267a01215
method: GET
headers:
  User-Agent: insomnia/12.6.0
scripts:
  - type: afterResponse
    code: "// Tests for GET /api/quiz/:id/performance\r

      \r

      const response = pm.response;\r

      const jsonData = response.json();\r

      const status = response.code;\r

      \r

      // ─── Shared helpers ───────────────────────────────────────────────────────────\r

      \r

      function isValidISODate(str) {\r

      \  return !isNaN(Date.parse(str));\r

      }\r

      \r

      // ─── Status code ──────────────────────────────────────────────────────────────\r

      \r

      pm.test(\"Status code is 200\", () => {\r

      \  pm.response.to.have.status(200);\r

      });\r

      \r

      // ─── Response structure ───────────────────────────────────────────────────────\r

      \r

      pm.test(\"Response has success: true\", () => {\r

      \  pm.expect(jsonData).to.have.property(\"success\", true);\r

      });\r

      \r

      pm.test(\"Response has a data array\", () => {\r

      \  pm.expect(jsonData).to.have.property(\"data\");\r

      \  pm.expect(jsonData.data).to.be.an(\"array\");\r

      });\r

      \r

      pm.test(\"Data array is non-empty\", () => {\r

      \  pm.expect(jsonData.data.length).to.be.greaterThan(0);\r

      });\r

      \r

      // ─── Shape of each performance record ────────────────────────────────────────\r

      \r

      pm.test(\"Each record contains expected fields\", () => {\r

      \  jsonData.data.forEach((record, i) => {\r

      \    pm.expect(record, `record[${i}] missing id`).to.have.property(\"id\");\r

      \    pm.expect(record, `record[${i}] missing quizId`).to.have.property(\"quizId\");\r

      \    pm.expect(record, `record[${i}] missing userId`).to.have.property(\"userId\");\r

      \    // Add or remove fields below to match your actual Prisma schema\r

      \    // pm.expect(record).to.have.property(\"score\");\r

      \    // pm.expect(record).to.have.property(\"createdAt\");\r

      \  });\r

      });\r

      \r

      pm.test(\"quizId matches the requested :id param\", () => {\r

      \  const requestedId = pm.request.url.path.slice(-1)[0]; // last path segment\r

      \  jsonData.data.forEach((record, i) => {\r

      \    pm.expect(record.quizId, `record[${i}] quizId mismatch`).to.eql(requestedId);\r

      \  });\r

      });\r

      \r

      pm.test(\"userId is consistent across all records\", () => {\r

      \  const ids = jsonData.data.map((r) => r.userId);\r

      \  pm.expect(new Set(ids).size, \"userId should be the same on every record\").to.eql(1);\r

      });\r

      \r

      // ─── Store data for chained requests (optional) ───────────────────────────────\r

      \r

      if (status === 200 && jsonData.data.length > 0) {\r

      \  pm.collectionVariables.set(\"latestPerformanceId\", jsonData.data[0].id);\r

      }"
    language: text/javascript
settings:
  followRedirects: true
  disableUrlEncoding: false
  disableCookies: false
examples: ./.resources/Retrieve metrics of a specific quiz.resources/examples
order: 3000
