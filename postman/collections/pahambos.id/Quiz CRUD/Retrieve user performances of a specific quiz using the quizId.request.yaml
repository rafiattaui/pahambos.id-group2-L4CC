$kind: http-request
description: |-
  ## Retrieve Metrics of a Specific Quiz

  Retrieves performance metrics for a specific quiz identified by its unique ID. This endpoint returns statistical or analytical data associated with the given quiz's performance record.

  ---

  ### HTTP Method & URL

  ```
  GET localhost:3000/api/performance/:quizId
  ```

  ---

  ### Path Parameters

  | Parameter | Type   | Required | Description                                      | Example                                |
  |-----------|--------|----------|--------------------------------------------------|----------------------------------------|
  | `quizId`  | UUID   | Yes      | The unique identifier of the quiz to retrieve metrics for | `ae4d32bb-f39c-4d49-b73c-dff3a8e018de` |

  ---

  ### Successful Response

  **Status:** `200 OK`

  Returns a JSON object containing the performance metrics for the specified quiz. This may include data such as scores, completion rates, attempt counts, or other relevant analytics tied to the quiz.

  ---

  ### Error Response

  **Status:** `404 Not Found`

  Returned when no performance record is found for the provided quiz ID.

  ```json
  {
    "success": false,
    "error": "Performance not found"
  }
  ```
url: localhost:3000/api/quiz/29955e49-b640-4117-8d0c-d1f267a01215/performance
method: GET
scripts:
  - type: afterResponse
    code: "// Get the response status code\r

      const statusCode = pm.response.code;\r

      \r

      switch (statusCode) {\r

      \    case 200:\r

      \        const json = pm.response.json();\r

      \        pm.test(\"Status code is 200 (OK)\", () => {\r

      \            pm.response.to.have.status(200);\r

      \        });\r

      \        \r

      \        pm.test(\"Contains success bool\", () => {\r

      \            pm.expect(json).to.have.property('success');\r

      \r

      \            if (json.success === false) {\r

      \                pm.test(\"Proper message if no performances are found\", () => {\r

      \                    pm.expect(json).to.have.property('message');\r

      \r

      \                })\r

      \            } else {\r

      \                pm.test(\"Proper performance response format\", () => {\r

      \                    pm.expect(json).to.have.property(\"data\")\r

      \                    pm.expect(json.data).to.be.a(\"array\")\r

      \                    if (json.data.length > 0) {\r

      \                        pm.expect(json.data[0]).to.have.property(\"id\")\r

      \                        pm.expect(json.data[0]).to.have.property(\"quizId\")\r

      \                        pm.expect(json.data[0]).to.have.property(\"userId\")\r

      \                        pm.expect(json.data[0]).to.have.property(\"finalScore\")\r

      \                    }\r

      \                })\r

      \            }\r

      \        })\r

      \        break;\r

      \    \r

      \    case 404:\r

      \        pm.test(\"False success bool and invalid UUID message.\", () => {\r

      \            const json = pm.response.json();\r

      \            pm.expect(json.success).to.be.equal(false);\r

      \            pm.expect(json.message).to.contain(\"invalid\")\r

      \        })\r

      \        break\r

      \    \r

      \    case 401:\r

      \        pm.test(\"Status code is 401 (Unauthorized)\", () => {\r

      \            pm.response.to.have.status(401);\r

      \        });\r

      \        break;\r

      \r

      \    default:\r

      \        pm.test(`Unexpected Status Code: ${statusCode}`, () => {\r

      \            pm.expect.fail(`Received an unhandled status code: ${statusCode}`);\r

      \        });\r

      }"
    language: text/javascript
settings:
  followRedirects: true
  disableUrlEncoding: false
  disableCookies: false
examples: .resources/Retrieve user performances of a specific quiz using the quizId.resources/examples
order: 3000
