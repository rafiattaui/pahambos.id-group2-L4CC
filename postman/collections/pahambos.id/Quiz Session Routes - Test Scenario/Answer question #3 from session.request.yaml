$kind: http-request
url: localhost:3000/api/session/question
method: POST
headers:
  Content-Type: application/json
  User-Agent: insomnia/12.6.0
body:
  type: json
  content: |-
    {
    	"answer": [
            2
    	]
    }
scripts:
  - type: afterResponse
    code: "const statusCode = pm.response.code;\r

      \r

      switch (statusCode) {\r

      \    case 200:\r

      \        pm.test(\"Status code is 200 (OK)\", () => {\r

      \            pm.response.to.have.status(200);\r

      \        });\r

      \        \r

      \        pm.test(\"Response contains correct data\", () => {\r

      \            const jsonData = pm.response.json();\r

      \            pm.expect(jsonData.success).to.be.equal(true);\r

      \            pm.expect(jsonData.isCorrect).to.be.equal(false);\r

      \            pm.expect(jsonData.points).to.be.equal(0);\r

      \        });\r

      \        break;\r

      \    \r

      \    case 400:\r

      \        pm.test(\"Validation Error Response contains correct data\", () => {\r

      \            const jsonData = pm.response.json();\r

      \            pm.expect(jsonData.success).to.be.equal(false);\r

      \            pm.expect(jsonData.message).to.be.equal(\"Validation failed\");\r

      \        });\r

      \        break\r

      \    \r

      \    case 401:\r

      \        pm.test(\"Status code is 401 (Unauthorized)\", () => {\r

      \            pm.response.to.have.status(401);\r

      \        });\r

      \        break;\r

      \r

      \    default:\r

      \        pm.test(`Unexpected Status Code: ${statusCode}`, () => {\r

      \            pm.expect.fail(`Received an unhandled status code: ${statusCode}`);\r

      \        });\r

      }"
    language: text/javascript
settings:
  followRedirects: true
  disableUrlEncoding: false
  disableCookies: false
examples: ".resources/Answer question #3 from session.resources/examples"
order: 4503590467814264
