$kind: http-request
name: Retrieve a user's past performances
url: "{{baseUrl}}/api/quiz/user/performance"
method: GET
scripts:
  - type: afterResponse
    code: "// Get the response status code\r

      const statusCode = pm.response.code;\r

      \r

      switch (statusCode) {\r

      \    case 200:\r

      \        pm.test(\"Status code is 200 (OK)\", () => {\r

      \            pm.response.to.have.status(200);\r

      \        });\r

      \        \r

      \        pm.test(\"Response contains correct data\", () => {\r

      \            const jsonData = pm.response.json();\r

      \            pm.expect(jsonData).to.have.property('success');\r

      \            pm.expect(jsonData.success).to.be.true;\r

      \r

      \            pm.expect(jsonData.data).to.be.a('array')\r

      \            \r

      \            if (jsonData.data.length > 0) {\r

      \                pm.expect(jsonData.data[0]).to.have.property('id');\r

      \                pm.expect(jsonData.data[0]).to.have.property('quizId');\r

      \                pm.expect(jsonData.data[0]).to.have.property('userId');\r

      \                pm.expect(jsonData.data[0]).to.have.property('finalScore');\r

      \                pm.expect(jsonData.data[0]).to.have.property('accuracyRate');\r

      \                pm.expect(jsonData.data[0]).to.have.property('timeTaken');\r

      \            }\r

      \        });\r

      \        break;\r

      \    \r

      \    case 401:\r

      \        pm.test(\"Status code is 401 (Unauthorized)\", () => {\r

      \            pm.response.to.have.status(401);\r

      \        });\r

      \        break;\r

      \r

      \    default:\r

      \        pm.test(`Unexpected Status Code: ${statusCode}`, () => {\r

      \            pm.expect.fail(`Received an unhandled status code: ${statusCode}`);\r

      \        });\r

      }"
    language: text/javascript
examples: .resources/Retrieve a user's past performances.resources/examples
order: 2824580405206690
