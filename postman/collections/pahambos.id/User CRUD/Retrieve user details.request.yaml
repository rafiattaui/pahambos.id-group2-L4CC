$kind: http-request
url: localhost:3000/api/user
method: GET
scripts:
  - type: afterResponse
    code: "// Get the response status code\r

      const statusCode = pm.response.code;\r

      \r

      switch (statusCode) {\r

      \    case 200:\r

      \        pm.test(\"Status is 200 (OK)\", () => {\r

      \            pm.response.to.have.status(200);\r

      \        });\r

      \        \r

      \        pm.test(\"Response contains success data\", () => {\r

      \            const jsonData = pm.response.json();\r

      \            pm.expect(jsonData).to.have.property('name');\r

      \            pm.expect(jsonData).to.have.property('email');\r

      \            pm.expect(jsonData).to.have.property('createdAt');\r

      \            pm.expect(jsonData).to.have.property('id');\r

      \        });\r

      \        break;\r

      \r

      \    case 401:\r

      \        pm.test(\"Status code is 401 (Unauthorized)\", () => {\r

      \            pm.response.to.have.status(401);\r

      \        });\r

      \        break;\r

      \r

      \    default:\r

      \        pm.test(`Unexpected Status Code: ${statusCode}`, () => {\r

      \            pm.expect.fail(`Received an unhandled status code: ${statusCode}`);\r

      \        });\r

      }"
    language: text/javascript
examples: ./.resources/Retrieve user details.resources/examples
order: 2000
